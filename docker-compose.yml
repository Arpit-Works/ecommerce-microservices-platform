version: "3.9"

services:
  api-gateway:
    build: .
    working_dir: /app/api-gateway
    command: npm run dev
    ports:
      - "5000:5000"
    env_file:
      - ./api-gateway/.env

  auth-service:
    build: .
    working_dir: /app/services/auth-service
    command: npm run dev
    ports:
      - "5001:5001"
    env_file:
      - ./services/auth-service/.env

  product-service:
    build: .
    working_dir: /app/services/product-service
    command: npm run dev
    ports:
      - "5002:5002"
    env_file:
      - ./services/product-service/.env

  order-service:
    build: .
    working_dir: /app/services/order-service
    command: npm run dev
    ports:
      - "5003:5003"
    env_file:
      - ./services/order-service/.env

  cart-service:
    build: .
    working_dir: /app/services/cart-service
    command: npm run dev
    ports:
      - "5004:5004"
    env_file:
      - ./services/cart-service/.env
